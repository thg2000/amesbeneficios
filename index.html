<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMES Benefícios</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
    }

    .banner {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .banner img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Ajustes para mobile */
    @media (max-width: 768px) {
      .container {
        padding: 8px;
      }

      .banner {
        border-radius: 8px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="banner">
      <img src="aviso.jpeg" alt="Atualização da Rede de Parceiros AMES">
    </div>
  </div>

</body>
</html>
